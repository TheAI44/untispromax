<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=no">
  <title>UntisProMax</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@300;400;600;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  
  <!-- Firebase Compat Scripts (Works everywhere, even without a server) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
</head>
<body>

  <!-- AUTH SCREEN -->
  <div id="authScreen" class="screen">
    <div class="auth-logo">
      <div class="logo-text">UNTISPROMAX</div>
      <div class="logo-sub">Advanced School Management</div>
    </div>
    <div class="auth-card">
      <div class="auth-tabs">
        <button class="auth-tab active" onclick="window.switchTab('login')">LOGIN</button>
        <button class="auth-tab" onclick="window.switchTab('signup')">SIGNUP</button>
      </div>
      <div id="msgBox"></div>
      <div id="loginForm">
        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" id="loginEmail" class="form-input" placeholder="dein@email.de">
        </div>
        <div class="form-group">
          <label class="form-label">Passwort</label>
          <input type="password" id="loginPassword" class="form-input" placeholder="••••••••">
        </div>
        <button class="btn btn-primary" onclick="window.doLogin()">Anmelden</button>
      </div>
      <div id="signupFlow" style="display:none;">
        <div class="step-indicator">
          <div id="dot1" class="step-dot active"></div>
          <div id="dot2" class="step-dot"></div>
          <div id="dot3" class="step-dot"></div>
        </div>
        <div id="step1">
          <div class="form-group"><label class="form-label">Email</label><input type="email" id="regEmail" class="form-input"></div>
          <div class="form-group"><label class="form-label">Passwort</label><input type="password" id="regPassword" class="form-input"></div>
          <button class="btn btn-primary" onclick="window.signupStep1()">Weiter</button>
        </div>
        <div id="step2" style="display:none;">
          <div class="form-group"><label class="form-label">Klassen-Code</label><input type="text" id="classCode" class="form-input" placeholder="HLG1"></div>
          <button class="btn btn-primary" onclick="window.signupStep3()">Prüfen</button>
        </div>
        <div id="step3" style="display:none;">
          <div class="form-group"><label class="form-label">Dein Name</label><input type="text" id="regName" class="form-input"></div>
          <button class="btn btn-primary" onclick="window.signupStep3b()">Registrieren</button>
        </div>
      </div>
    </div>
  </div>

  <!-- APP SCREEN -->
  <div id="appScreen" class="screen hidden">
    <div class="topbar">
      <div class="topbar-title" id="topbarTitle">STARTSEITE</div>
      <div class="topbar-right">
        <button class="icon-btn" onclick="openSettings()">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        </button>
        <div class="avatar-btn" id="topbarAvatar" onclick="openSettings()">?</div>
      </div>
    </div>

    <div class="app-content">
      <div id="homePage" class="page active">
        <div class="home-header">
          <div class="home-date" id="homeDate">...</div>
          <div class="home-time" id="homeClock">00:00:00</div>
          <div class="home-greeting" id="homeGreeting">Laden...</div>
        </div>
        <div class="section-block">
          <div class="section-title">Anstehende Hausaufgaben</div>
          <div id="homeHwList"></div>
        </div>
      </div>

      <div id="timetablePage" class="page">
        <div class="tt-week-header">
          <div>
            <div class="tt-week-label" id="ttWeekLabel">Diese Woche</div>
            <div class="tt-week-dates" id="ttWeekDates">...</div>
          </div>
          <div class="tt-week-nav">
            <button class="tt-nav-btn" onclick="changeWeek(-1)">←</button>
            <button class="tt-nav-btn" onclick="changeWeek(1)">→</button>
          </div>
        </div>
        <div class="day-tabs" id="dayTabs"></div>
        <div id="ttContent" class="fade-up"></div>
      </div>

      <div id="homeworkPage" class="page">
        <div class="filter-tabs">
          <button class="filter-tab active" id="hwFilterUpcoming" onclick="setHwFilter('upcoming')">Aktuell</button>
          <button class="filter-tab" id="hwFilterDone" onclick="setHwFilter('done')">Erledigt</button>
        </div>
        <div id="hwList"></div>
      </div>

      <div id="testsPage" class="page">
        <div id="testList"></div>
      </div>

      <div id="eventsPage" class="page">
        <div id="eventList"></div>
      </div>

      <div id="recoveryPage" class="page">
        <div class="recovery-header">
          <div class="recovery-title">NACHHOLSTOFF</div>
          <div class="recovery-sub">Tagebuch für verpassten Unterricht</div>
        </div>
        <div id="recoveryContent"></div>
      </div>
    </div>

    <button class="fab" id="fabBtn" onclick="openFab()">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    </button>

    <div class="bottom-nav">
      <button class="nav-item active" id="nav-home" onclick="goTo('home')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        <span class="nav-label">Start</span>
      </button>
      <button class="nav-item" id="nav-timetable" onclick="goTo('timetable')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        <span class="nav-label">Plan</span>
      </button>
      <button class="nav-item" id="nav-homework" onclick="goTo('homework')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
        <span class="nav-label">Aufgaben</span>
      </button>
      <button class="nav-item" id="nav-mehr" onclick="toggleMehrMenu()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></svg>
        <span class="nav-label">Mehr</span>
      </button>
    </div>

    <div id="mehrPopup" class="mehr-popup hidden">
      <button class="mehr-item" onclick="mehrGoTo('tests')">📝 Tests & Arbeiten</button>
      <button class="mehr-item" onclick="mehrGoTo('events')">🗓️ Ereignisse</button>
      <button class="mehr-item" onclick="mehrGoTo('recovery')">🌡️ Nachholstoff</button>
      <button class="mehr-item" onclick="logout()" style="color:var(--danger)">🚪 Abmelden</button>
    </div>
  </div>

  <!-- MODALS -->
  <div id="addItemOverlay" class="modal-overlay hidden" onclick="closeIfBackdrop(event, 'addItemOverlay')">
    <div class="modal">
      <div class="modal-title" id="addItemTitle">Hinzufügen</div>
      <div class="form-group"><label class="form-label">Datum</label><input type="date" id="addItemDate" class="form-input"></div>
      <div class="form-group"><label class="form-label">Beschreibung</label><textarea id="addItemDesc" class="form-input"></textarea></div>
      <button class="btn btn-primary" onclick="saveNewItem()">Speichern</button>
      <button class="btn btn-secondary" style="margin-top:8px;" onclick="closeModal('addItemOverlay')">Abbrechen</button>
    </div>
  </div>

  <div id="settingsOverlay" class="modal-overlay hidden" onclick="closeIfBackdrop(event, 'settingsOverlay')">
    <div class="modal">
      <div class="modal-title">EINSTELLUNGEN</div>
      <div class="photo-upload">
        <div class="photo-preview" id="settingsPhotoPreview">?</div>
        <button class="btn btn-secondary" onclick="triggerPhotoUpload()">Bild ändern</button>
        <input type="file" id="photoInput" hidden onchange="handlePhotoUpload(event)">
      </div>
      <div class="form-group"><label class="form-label">Name</label><input type="text" id="settingsName" class="form-input"></div>
      <div class="form-group"><label class="form-label">Email</label><input type="text" id="settingsEmail" class="form-input" disabled></div>
      <button class="btn btn-primary" onclick="saveSettings()">Speichern</button>
      <button class="btn btn-secondary" style="margin-top:8px;" onclick="closeModal('settingsOverlay')">Schließen</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
